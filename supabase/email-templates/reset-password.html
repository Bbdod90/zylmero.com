<!--
  Supabase → Authentication → Email templates → Reset password
  Onderwerp: plak exact reset-password-subject.txt (één regel, zonder "Body (HTML):").
-->
<div style="font-family:system-ui,-apple-system,sans-serif;line-height:1.55;color:#0f172a;max-width:560px;margin:0 auto;padding:8px;">
  <h1 style="font-size:22px;font-weight:700;margin:0 0 12px;">Wachtwoord resetten</h1>
  <p style="margin:0 0 16px;">Je hebt een nieuw wachtwoord aangevraagd voor je Zylmero-account.</p>
  <p style="margin:0 0 20px;">
    <a href="{{ .SiteURL }}/reset-password?r=1&token_hash={{ .TokenHash }}&type=recovery"
       style="background:#4F6EF7;color:#fff;padding:14px 22px;border-radius:10px;text-decoration:none;font-weight:600;display:inline-block;">
      Nieuw wachtwoord kiezen
    </a>
  </p>
  <p style="margin:0 0 8px;font-size:14px;color:#64748b;">Werkt de knop niet? Kopieer deze link:</p>
  <p style="margin:0 0 24px;font-size:13px;word-break:break-all;color:#334155;">{{ .SiteURL }}/reset-password?r=1&token_hash={{ .TokenHash }}&type=recovery</p>
  <p style="margin:0;font-size:13px;color:#94a3b8;">Heb je dit niet aangevraagd? Negeer deze e-mail.</p>
  <p style="margin:20px 0 0;font-size:14px;color:#64748b;">— Team Zylmero</p>
</div>
