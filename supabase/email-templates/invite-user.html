<!--
  Supabase → Authentication → Email templates → Invite user
  Onderwerp: plak exact invite-user-subject.txt (één regel).
-->
<div style="font-family:system-ui,-apple-system,sans-serif;line-height:1.55;color:#0f172a;max-width:560px;margin:0 auto;padding:8px;">
  <h1 style="font-size:22px;font-weight:700;margin:0 0 12px;">Je bent uitgenodigd voor Zylmero</h1>
  <p style="margin:0 0 16px;">Accepteer de uitnodiging om mee te werken in het teamdashboard.</p>
  <p style="margin:0 0 20px;">
    <a href="{{ .SiteURL }}/auth/callback?next=/dashboard&token_hash={{ .TokenHash }}&type=invite"
       style="background:#4F6EF7;color:#fff;padding:14px 22px;border-radius:10px;text-decoration:none;font-weight:600;display:inline-block;">
      Uitnodiging accepteren
    </a>
  </p>
  <p style="margin:0 0 8px;font-size:14px;color:#64748b;">Werkt de knop niet? Kopieer deze link:</p>
  <p style="margin:0;font-size:13px;word-break:break-all;color:#334155;">{{ .SiteURL }}/auth/callback?next=/dashboard&token_hash={{ .TokenHash }}&type=invite</p>
  <p style="margin:20px 0 0;font-size:14px;color:#64748b;">— Team Zylmero</p>
</div>
